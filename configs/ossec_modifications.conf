<!-- ===================================================================== -->
<!-- 1. WINDOWS AGENT CONFIGURATION CHANGES                                -->
<!-- File Location on Windows Endpoint: C:\Program Files (x86)\ossec-agent\ossec.conf -->
<!-- ===================================================================== -->
<syscheck>
  <disabled>no</disabled>
  <frequency>43200</frequency>

  <!-- Monitored Windows directories for real-time tampering detection -->
  <directories realtime="yes" check_all="yes">C:\Users\Public</directories>
  <directories realtime="yes" check_all="yes">C:\Windows\System32\drivers\etc</directories>
</syscheck>


<!-- ===================================================================== -->
<!-- 2. UBUNTU SERVER (WAZUH MANAGER) CONFIGURATION CHANGES                -->
<!-- File Location on Linux Server: /var/ossec/etc/ossec.conf             -->
<!-- ===================================================================== -->

<!-- File Integrity Monitoring (FIM) Policies for Linux Targets -->
<syscheck>
  <disabled>no</disabled>
  <frequency>43200</frequency>

  <directories realtime="yes" check_all="yes">/etc,/usr/bin,/usr/sbin</directories>
  <directories realtime="yes" check_all="yes">/home/ubuntu</directories>
  <directories>/bin,/sbin,/boot</directories>
</syscheck>

<!-- Threat Intelligence Integration: VirusTotal Malware Detection Engine -->
<integration>
  <name>virustotal</name>
  <api_key>REDACTED_VIRUSTOTAL_PUBLIC_API_KEY</api_key> <!-- Sanitized for repository safety -->
  <group>syscheck</group>
  <alert_format>json</alert_format>
</integration>
